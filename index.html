<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Adivina el Artista</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  overflow: hidden; /* SIN SCROLL */
}

/* PANTALLAS */
.pantalla {
  position: absolute;
  width: 100%;
  height: 100vh;
  top: 0;
  left: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;

  opacity: 0;
  pointer-events: none;
  transition: opacity 0.5s ease;
}

.pantalla.activa {
  opacity: 1;
  pointer-events: all;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  padding: 20px;
}

/* CARTAS */
.card {
  background: white;
  border: 2px solid black;
  cursor: pointer;
  height: 160px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  padding: 5px;
  position: relative;
}

.card img {
  width: 100%;
  height: 110px;
  object-fit: contain;
}

.card p {
  margin: 5px 0 0;
  font-size: 14px;
  font-weight: bold;
  color: black;
  background: white;
  border-radius: 4px;
}

/* TAPA ROJA */
.card.eliminado::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(255,0,0,0.7);
  top: 0;
  left: 0;
}

/* BOTONES */
button {
  padding: 10px;
  margin: 5px;
  cursor: pointer;
  border: none;
  transition: 0.2s;
}

/* BOTONES EQUIPO */
.btn-rojo { background: #ffb3b3; }
.btn-azul { background: #b3ccff; }

/* SELECCIÓN ACTIVA */
.seleccionado {
  filter: brightness(70%);
  transform: scale(1.05);
}

/* BOTÓN EMPEZAR */
#btnEmpezar {
  margin-top: 20px;
}

/* COLORES DE EQUIPO */
.rojo { background: #ff4d4d; color: white; }
.azul { background: #4d79ff; color: white; }

</style>
</head>

<body>

<!-- INICIO -->
<div id="inicio" class="pantalla activa">
  <h1>Adivina el Artista 🎨</h1>

  <h3>Equipo</h3>
  <div id="botonesEquipo">
    <button class="btn-rojo" onclick="seleccionarEquipo(this,'Rojo')">Rojo</button>
    <button class="btn-azul" onclick="seleccionarEquipo(this,'Azul')">Azul</button>
  </div>

  <h3>Artista</h3>
  <div id="seleccionArtistas"></div>

  <button id="btnEmpezar" onclick="empezarJuego()">Empezar</button>
</div>

<!-- JUEGO -->
<div id="juego" class="pantalla">
  <h2 id="equipoTexto"></h2>
  <h3>Tu artista: <span id="artistaElegido"></span></h3>

  <div class="grid" id="tablero"></div>

  <button onclick="reiniciar()">Reiniciar</button>
</div>

<script>
const artistas = [
  {nombre: "Monet", img: "img/monet.jpg"},
  {nombre: "Renoir", img: "img/renoir.jpg"},
  {nombre: "Degas", img: "img/degas.jpg"},
  {nombre: "Pissarro", img: "img/pissarro.jpg"},
  {nombre: "Morisot", img: "img/morisot.jpg"},
  {nombre: "Manet", img: "img/manet.jpg"},
  {nombre: "Sisley", img: "img/sisley.jpg"},
  {nombre: "Caillebotte", img: "img/caillebotte.jpg"},
  {nombre: "Cassatt", img: "img/cassatt.jpg"},
  {nombre: "Bazille", img: "img/bazille.jpg"},
  {nombre: "Guillaumin", img: "img/guillaumin.jpg"},
  {nombre: "Gonzales", img: "img/gonzales.jpg"}
];

let equipo = "";
let elegido = "";

/* SELECCIÓN EQUIPO */
function seleccionarEquipo(btn, valor) {
  equipo = valor;

  document.querySelectorAll("#botonesEquipo button")
    .forEach(b => b.classList.remove("seleccionado"));

  btn.classList.add("seleccionado");
}

/* SELECCIÓN ARTISTA */
const seleccionDiv = document.getElementById("seleccionArtistas");

artistas.forEach(a => {
  const btn = document.createElement("button");
  btn.textContent = a.nombre;

  btn.onclick = () => {
    elegido = a.nombre;

    document.querySelectorAll("#seleccionArtistas button")
      .forEach(b => b.classList.remove("seleccionado"));

    btn.classList.add("seleccionado");
  };

  seleccionDiv.appendChild(btn);
});

/* CAMBIO DE PANTALLA */
function empezarJuego() {
  if(equipo === "" || elegido === "") {
    alert("Selecciona equipo y artista");
    return;
  }

  document.getElementById("inicio").classList.remove("activa");
  document.getElementById("juego").classList.add("activa");

  document.body.classList.remove("rojo","azul");
  document.body.classList.add(equipo.toLowerCase());

  document.getElementById("equipoTexto").textContent = "Equipo: " + equipo;
  document.getElementById("artistaElegido").textContent = elegido;

  cargarTablero();
}

/* TABLERO */
function cargarTablero() {
  const tablero = document.getElementById("tablero");
  tablero.innerHTML = "";

  artistas.forEach(a => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${a.img}">
      <p>${a.nombre}</p>
    `;

    div.onclick = () => {
      div.classList.toggle("eliminado");
    };

    tablero.appendChild(div);
  });
}

/* REINICIAR */
function reiniciar() {
  document.getElementById("juego").classList.remove("activa");
  document.getElementById("inicio").classList.add("activa");

  document.body.classList.remove("rojo","azul");

  equipo = "";
  elegido = "";

  // quitar selección visual
  document.querySelectorAll(".seleccionado")
    .forEach(b => b.classList.remove("seleccionado"));
}
</script>

</body>
</html>
